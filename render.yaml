services:
  - type: web
    name: my-new-sns
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn study_app_new.wsgi:application --log-file - --workers 2 --threads 4
    envVars:
      - key: REDIS_URL
        fromService:
          type: redis
          name: my-new-sns-redis
          property: connectionString

  - type: redis
    name: my-new-sns-redis
    ipAllowList: []
    plan: free
