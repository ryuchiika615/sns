name: Keep Render Awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping study SNS
        run: |
          curl --silent --show-error --location --max-time 60 \
            https://ryunosuke-study-sns.onrender.com/ \
            --output /dev/null
