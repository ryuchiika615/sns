name: Keep Render Awake

on:
  schedule:
    # GitHub Actions cron is UTC. This runs every 10 minutes except 03:00-07:59 JST.
    - cron: "*/10 0-17,23 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping study SNS
        run: |
          curl --silent --show-error --location --max-time 60 \
            https://ryunosuke-study-sns.onrender.com/ \
            --output /dev/null
