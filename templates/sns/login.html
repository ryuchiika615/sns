<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン - リュッター</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; background: #1a1a1a; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; }
        .card { background: #2a2a2a; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: 90%; max-width: 400px; text-align: center; border: 1px solid #333; }
        h2 { color: #fbc02d; margin-top: 0; font-size: 1.5rem; }
        .form-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-size: 0.9rem; margin-bottom: 5px; color: #ccc; font-weight: bold; }
        input[type="text"], input[type="password"] { width: 100%; padding: 12px; border: 1px solid #444; border-radius: 8px; background: #333; color: white; box-sizing: border-box; font-size: 1rem; }
        .btn-primary { background: #1877f2; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; font-size: 1.1rem; margin-top: 10px; transition: 0.2s; }
        .btn-primary:hover { background: #166fe5; transform: translateY(-2px); }
        .link { display: inline-block; margin-top: 20px; color: #1da1f2; text-decoration: none; font-size: 0.9rem; }
        .link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <h2><i class="fas fa-layer-group"></i> リュッターにログイン</h2>
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>ユーザーID</label>
                <input type="text" name="username" placeholder="ユーザーIDを入力" required>
            </div>
            <div class="form-group">
                <label>パスワード</label>
                <input type="password" name="password" placeholder="パスワードを入力" required>
            </div>
            <button type="submit" class="btn-primary">ログイン</button>
        </form>
        <a href="{% url 'signup' %}" class="link">アカウントを持っていませんか？ 新規登録へ</a>
    </div>
</body>
</html>
