<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分析レポート - リュッター</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding-bottom: 80px; }
        .header { background: #1a1a1a; padding: 15px; color: white; text-align: center; position: sticky; top: 0; z-index: 100; font-weight: bold; }
        .container { max-width: 600px; margin: auto; padding: 15px; }
        .card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .card-title { font-size: 1.1rem; font-weight: bold; border-bottom: 2px solid #f0f2f5; padding-bottom: 10px; margin-bottom: 15px; color: #333; }

        .subject-list { list-style: none; padding: 0; margin: 0; }
        .subject-list li { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; font-size: 0.95rem; }
        .subject-list li:last-child { border-bottom: none; }
        .subject-name { font-weight: bold; color: #555; }
        .subject-time { font-weight: bold; color: #1877f2; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #1a1a1a; display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; }
        .nav-item { color: #aaa; text-decoration: none; font-size: 1.5rem; position: relative; }
        .nav-item.active { color: white; }
    </style>
</head>
<body>
    <div class="header">
        <i class="fas fa-chart-pie"></i> 分析レポート
    </div>

    <div class="container">
        <div class="card" style="text-align: center; background: linear-gradient(135deg, #1877f2, #0d47a1); color: white;">
            <div style="font-size: 0.9rem; margin-bottom: 5px;">これまでの累計学習時間</div>
            <div style="font-size: 2rem; font-weight: bold;">{{ total_all_time_display }}</div>
        </div>

        <div class="card">
            <div class="card-title">📚 科目別の割合</div>
            {% if subject_list %}
                <div style="width: 100%; max-width: 300px; margin: 0 auto 20px;">
                    <canvas id="pieChart"></canvas>
                </div>
                <ul class="subject-list">
                    {% for subject in subject_list %}
                    <li>
                        <span class="subject-name"><i class="fas fa-book"></i> {{ subject.name }}</span>
                        <span class="subject-time">{{ subject.display_time }}</span>
                    </li>
                    {% endfor %}
                </ul>
            {% else %}
                <p style="text-align: center; color: #999;">まだ学習記録がありません。</p>
            {% endif %}
        </div>

        <div class="card">
            <div class="card-title">📅 月別の学習推移</div>
            <canvas id="barChart" height="200"></canvas>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="{% url 'index' %}" class="nav-item"><i class="fas fa-home"></i></a>
        <a href="{% url 'analytics' %}" class="nav-item active"><i class="fas fa-chart-pie"></i></a>
        <a href="{% url 'user_profile' user.username %}" class="nav-item"><i class="fas fa-user"></i></a>
        <a href="{% url 'gacha' %}" class="nav-item"><i class="fas fa-coins" style="color: #fbc02d;"></i></a>
    </div>

    <script>
        // 科目別の円グラフ
        const pieCtx = document.getElementById('pieChart');
        if (pieCtx) {
            new Chart(pieCtx.getContext('2d'), {
                type: 'doughnut',
                data: {
                    labels: {{ pie_labels|safe }},
                    datasets: [{
                        data: {{ pie_data|safe }},
                        backgroundColor: ['#1877f2', '#e0245e', '#fbc02d', '#17bf63', '#9c27b0', '#ff9800', '#00bcd4'],
                        borderWidth: 1
                    }]
                },
                options: { cutout: '60%', plugins: { legend: { position: 'bottom' } } }
            });
        }

        // 月別の棒グラフ
        const barCtx = document.getElementById('barChart');
        if (barCtx) {
            new Chart(barCtx.getContext('2d'), {
                type: 'bar',
                data: {
                    labels: {{ bar_labels|safe }},
                    datasets: [{
                        label: '月間学習時間(分)',
                        data: {{ bar_data|safe }},
                        backgroundColor: '#1877f2',
                        borderRadius: 5,
                    }]
                },
                options: { scales: { y: { beginAtZero: true } } }
            });
        }
    </script>
</body>
</html>
