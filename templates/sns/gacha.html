<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ガチャポン - 学習記録SNS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; text-align: center; padding: 20px; box-sizing: border-box; }
        .gacha-container { background: #2a2a2a; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 500px; border: 2px solid #fbc02d; }

        .points-badge { background: #fbc02d; color: #000; padding: 5px 15px; border-radius: 20px; font-weight: bold; display: inline-block; margin-bottom: 20px; }

        .result-box { min-height: 150px; margin: 20px 0; padding: 20px; background: #333; border-radius: 15px; border: 1px dashed #555; display: flex; flex-direction: column; justify-content: center; align-items: center; max-height: 400px; overflow-y: auto; }

        .result-grid { display: grid; grid-template-columns: 1fr; gap: 10px; width: 100%; }
        .result-item-card { background: #222; border-radius: 10px; padding: 15px; border: 1px solid #444; }

        .rarity-badge { font-size: 1rem; font-weight: bold; margin-bottom: 5px; display: inline-block; padding: 2px 8px; border-radius: 4px; }
        .SSR { background: linear-gradient(45deg, #ffe259, #ffa751); color: #fff; box-shadow: 0 0 15px #ff9800; animation: bounce 0.5s ease alternate infinite; }
        .SR { background: #9c27b0; color: #fff; }
        .R { background: #2196f3; color: #fff; }
        .N { background: #666; color: #fff; }

        .btn-group { display: flex; gap: 10px; justify-content: center; margin-top: 15px; }
        .spin-btn { background: #fbc02d; color: #000; border: none; padding: 15px; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; flex: 1; transition: transform 0.1s; box-shadow: 0 4px 0 #c49000; }
        .spin-btn-10 { background: #ff4757; color: #fff; box-shadow: 0 4px 0 #ff1e33; }

        .spin-btn:active { transform: translateY(4px); box-shadow: none; }
        .spin-btn:disabled { background: #555; color: #888; box-shadow: none; cursor: not-allowed; }

        .home-link { display: inline-block; margin-top: 25px; color: #aaa; text-decoration: none; font-size: 0.9rem; transition: color 0.3s; }
        .home-link:hover { color: #fbc02d; }
        .error-msg { color: #ff5252; font-size: 0.9rem; margin-top: 10px; font-weight: bold; }

        @keyframes bounce { from { transform: scale(0.95); } to { transform: scale(1.05); } }
    </style>
</head>
<body>
    <div class="gacha-container">
        <div class="points-badge">
            <i class="fas fa-gem"></i> {{ points }} pt
        </div>

        <h2><i class="fas fa-capsules"></i> ガチャポン</h2>
        <p style="font-size:0.8rem; color:#aaa; margin-top:-10px;">SSR排出率: 0.00001%</p>

        <div class="result-box">
            {% if result_items %}
                <div class="result-grid">
                {% for item in result_items %}
                    <div class="result-item-card">
                        <div class="rarity-badge {{ item.rarity }}">{{ item.rarity }}</div>
                        <div style="font-size: 1.1rem; font-weight:bold; margin-top:5px;">
                            {% if item.rarity == 'SSR' %}👑 {% endif %}{{ item.name }}
                        </div>
                    </div>
                {% endfor %}
                </div>
            {% else %}
                <div style="color: #666;"><i class="fas fa-box-open fa-3x"></i><br>何が出るかな？</div>
            {% endif %}
        </div>

        {% if error %}
            <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="POST" class="btn-group">
            {% csrf_token %}
            <button type="submit" name="gacha_1" class="spin-btn" {% if points < 10 %}disabled{% endif %}>
                単発 (10pt)
            </button>
            <button type="submit" name="gacha_10" class="spin-btn spin-btn-10" {% if points < 100 %}disabled{% endif %}>
                10連 (100pt)
            </button>
        </form>

        <a href="{% url 'index' %}" class="home-link">
            <i class="fas fa-arrow-left"></i> タイムラインに戻る
        </a>
    </div>
</body>
</html>
